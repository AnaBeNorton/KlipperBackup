# This file contains pin mappings for the stock 2020 Creality Ender 3
# MAX. To use this config, during "make menuconfig" select the
# STM32F103 with a "28KiB bootloader" and serial (on USART1 PA10/PA9)
# communication.

# Because this printer has factory wiring, mounts, and firmware for
# a BLTouch, but does not ship with one at this time, default values
# for the sensor have been specified, but disabled, in anticipation of
# future revisions or user modification. User should take care to
# customize the offsets, particularly z-offset, for their specific unit.

# If you prefer a direct serial connection, in "make menuconfig"
# select "Enable extra low-level configuration options" and select
# serial (on USART3 PB11/PB10), which is broken out on the 10 pin IDC
# cable used for the LCD module as follows:
# 3: Tx, 4: Rx, 9: GND, 10: VCC

# Flash this firmware by copying "out/klipper.bin" to a SD card and
# turning on the printer with the card inserted. The firmware
# filename must end in ".bin" and must not match the last filename
# that was flashed.

# See docs/Config_Reference.md for a description of parameters.
[include mainsail.cfg]
#[include bigtreetech-adxl345-v2.0.cfg]
[exclude_object]

[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA5
position_endstop: 0
position_max: 300
homing_speed: 50

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 300
homing_speed: 50

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
# position_endstop: 0.0                     # disable to use BLTouch
# endstop_pin: ^PA7                         # disable to use BLTouch
endstop_pin: probe:z_virtual_endstop    # enable to use BLTouch
position_min: -5                        # enable to use BLTouch
position_max: 340

[safe_z_home]                         # enable for BLTouch
home_xy_position: 180, 190
speed: 100
z_hop: 10
z_hop_speed: 5

[bltouch]                             # enable for BLTouch - fast-mode
sensor_pin: ^PB1
control_pin: PB0
pin_up_touch_mode_reports_triggered: True
probe_with_touch_mode: True
x_offset: -30                          # modify as needed for bltouch location
y_offset: -40                          # modify as needed for bltouch location
#z_offset: 3.150                         # modify as needed for bltouch or run PROBE_CALIBRATE
speed: 10
samples: 3
sample_retract_dist: 5.0              # Can be set lower, example 2.5 depending on height of bltouch from bed
lift_speed: 40
samples_tolerance_retries: 3
speed: 10
samples: 2

[bed_mesh]                            # enable for BLTouch
speed: 300
mesh_min: 30, 30
mesh_max: 260, 260
algorithm: bicubic
probe_count: 7,7                      # 49 points due to large bed size
horizontal_move_z: 5

[screws_tilt_adjust]
screw1: 60,80
screw1_name: front left screw
screw2: 299,80
screw2_name: front right screw
screw3: 299,300
screw3_name: rear right screw
screw4: 60,300
screw4_name: rear left screw
horizontal_move_z: 10
speed: 50
screw_thread: CW-M4

[gcode_macro START_PRINT]
gcode:
  {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
  {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(190)|float %}
  G90 # use absolute coordinates
  M83 # extruder relative 
  M104 S{150} # set temporary nozzle temp to prevent oozing during homing
  M140 S{BED_TEMP} # set final bed temp
  M117 Bed Heating
  G4 S300 # Wait for 300 seconds to allow bed to soak
  M190 S{BED_TEMP} # Wait for final bed temp
  G4 S30 # allow partial nozzle warmup
  M117 Homing
  G28 # home all axis
  M117 Bed Leveling
  BED_MESH_CALIBRATE ADAPTIVE=1
  G1 Z50 F240
  G1 X2.0 Y10 F3000
  M104 S{EXTRUDER_TEMP} # set final nozzle temp
  M117 Nozzle Heating
  M109 S{EXTRUDER_TEMP} # wait for nozzle temp to stabilize
  G1 Z0.28 F240
  G92 E0
  M117 Priming Nozzle
  G1 X2.0 Y140 E10 F1500 # prime the nozzle
  G1 X2.3 Y140 F5000
  G92 E0
  G1 X2.3 Y10 E10 F1200 # prime the nozzle
  G92 E0
  M117 Engage!


[gcode_macro END_PRINT]
gcode:
# Turn off bed, extruder, and fan
  M140 S0
  M104 S0
  M106 S0
# Move nozzle away from print while retracting
  G91
  G1 Y-2 Z10 E-3 F300
  G90
  G28 X

# Disable steppers
  M84

# [gcode_macro G29]                    # If moving from marlin to klipper uncomment to mimic G29
# gcode:
#  BED_MESH_CALIBRATE
#  G1 X0 Y0 Z10 F4000



[extruder]
max_extrude_only_distance: 100.0
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
gear_ratio: 3.5:1
rotation_distance: 26.359
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
control: pid
# tuned for stock hardware with 200 degree Celsius target
pid_Kp: 29.291
pid_Ki: 1.743
pid_Kd: 123.021
min_temp: 0
max_temp: 300
pressure_advance: 0.04375     # Calibrate - see https://www.klipper3d.org/Pressure_Advance.html



[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

[fan]
pin: PA0

[filament_switch_sensor e0_sensor]
switch_pin: PA4

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0    # Run ls /dev/serial/by-id/* for micro-controller name
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 200
max_accel: 2000
max_z_velocity: 5
max_z_accel: 100

[display]
lcd_type: st7920
cs_pin: PB12
sclk_pin: PB13
sid_pin: PB15
encoder_pins: ^PB14, ^PB10
click_pin: ^!PB2

